model:
  type: CenterPoint
  base_config: centerpoint_voxel01_second_secfpn_head-circlenms_8xb4-cyclic-20e_nus-3d.py

data:
  root: data/nuscenes
  version: v1.0-mini
  batch_size: 2
  num_workers: 4

train:
  max_epochs: 20
  lr: 1.0e-4
  optimizer: AdamW
  scheduler: cyclic

checkpoint:
  save_dir: checkpoints/
  save_interval: 5
  drive_dir: /content/drive/MyDrive/perception_project/checkpoints/

eval:
  metric: NuScenes metric/mAP
  classes:
    - car
    - truck
    - construction_vehicle
    - bus
    - trailer
    - barrier
    - motorcycle
    - bicycle
    - pedestrian
    - traffic_cone

voxel:
  voxel_size: [0.1, 0.1, 0.2]
  point_cloud_range: [-51.2, -51.2, -5.0, 51.2, 51.2, 3.0]
